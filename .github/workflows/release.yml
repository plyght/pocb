name: Release Build

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'CMakeLists.txt'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rebuild (e.g. 0.1.0). Skips version check, tag, and release creation — only builds and attaches the DMG.'
        required: true

permissions:
  contents: write

jobs:
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
      prev_tag: ${{ steps.check.outputs.prev_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(grep -E '^project\(pocb VERSION ' CMakeLists.txt | sed -E 's/.*VERSION ([^ )]+).*/\1/')
          echo "Current version: $CURRENT_VERSION"

          git show HEAD^:CMakeLists.txt > /tmp/old_CMakeLists.txt 2>/dev/null || echo 'project(pocb VERSION 0.0.0 LANGUAGES CXX)' > /tmp/old_CMakeLists.txt
          PREV_VERSION=$(grep -E '^project\(pocb VERSION ' /tmp/old_CMakeLists.txt | sed -E 's/.*VERSION ([^ )]+).*/\1/')
          echo "Previous version: $PREV_VERSION"

          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "Previous tag: $PREV_TAG"
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          if git ls-remote --tags origin | grep -q "refs/tags/v$CURRENT_VERSION"; then
            echo "Tag v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "Version changed from $PREV_VERSION to $CURRENT_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  generate-notes:
    name: Generate AI release notes
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    outputs:
      release_notes: ${{ steps.generate.outputs.notes }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes from code diff
        id: generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          PREV_TAG="${{ needs.check-version.outputs.prev_tag }}"

          if [ -n "$PREV_TAG" ]; then
            echo "Getting diff from $PREV_TAG to HEAD"
            DIFF=$(git diff "$PREV_TAG"..HEAD -- '*.cpp' '*.h' '*.hpp' '*.m' '*.mm' '*.ui' '*.qrc' 'CMakeLists.txt' 2>/dev/null || echo "No diff available")
          else
            echo "No previous tag, getting diff from initial commit"
            FIRST_COMMIT=$(git rev-list --max-parents=0 HEAD)
            DIFF=$(git diff "$FIRST_COMMIT"..HEAD -- '*.cpp' '*.h' '*.hpp' '*.m' '*.mm' '*.ui' '*.qrc' 'CMakeLists.txt' 2>/dev/null || echo "No diff available")
          fi

          DIFF_LENGTH=${#DIFF}
          if [ $DIFF_LENGTH -gt 80000 ]; then
            DIFF="${DIFF:0:80000}... [truncated]"
          fi

          REQUEST=$(jq -n \
            --arg diff "Generate release notes for version $VERSION of pocb (a macOS Qt/C++ app distributed as a DMG).\n\nCode diff:\n$DIFF" \
            '{
              "model": "gpt-5.5",
              "messages": [
                {
                  "role": "system",
                  "content": "You generate release notes from code diffs. Rules:\n- No emojis\n- No title/header (release name already shown in GitHub UI)\n- Minimal, concise, yet comprehensive\n- Only include sections with actual changes (omit empty sections entirely)\n- Use markdown ## headers: Features, Fixes, Improvements, Breaking Changes\n- Focus on user-facing changes only, skip internal refactoring\n- If only version bump with no real changes, output exactly: Maintenance release."
                },
                {
                  "role": "user",
                  "content": $diff
                }
              ],
              "max_completion_tokens": 2000
            }')

          RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -d "$REQUEST")

          NOTES=$(echo "$RESPONSE" | jq -r '.choices[0].message.content // empty')

          if [ -z "$NOTES" ]; then
            echo "API call failed or empty response, using fallback"
            if [ -n "$PREV_TAG" ]; then
              NOTES="## What's Changed
          See the [full changelog](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...v${VERSION}) for details."
            else
              NOTES="## Release v${VERSION}
          Initial release."
            fi
          fi

          echo "$NOTES" > /tmp/release_notes.md

          echo "notes<<NOTES_EOF" >> $GITHUB_OUTPUT
          cat /tmp/release_notes.md >> $GITHUB_OUTPUT
          echo "NOTES_EOF" >> $GITHUB_OUTPUT

  create-tag:
    name: Create release tag
    runs-on: ubuntu-latest
    needs: [check-version, generate-notes]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check-version.outputs.version }}" -m "Release v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [check-version, generate-notes, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Create release with AI notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: ${{ needs.generate-notes.outputs.release_notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build macOS 26 arm64 DMG
    runs-on: macos-26
    needs: [check-version, create-release]
    if: always() && (needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ needs.check-version.outputs.version || github.event.inputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=26.0

      - name: Print linker inputs
        run: |
          if [ -f build/CMakeFiles/pocb.dir/link.txt ]; then
            cat build/CMakeFiles/pocb.dir/link.txt
            if grep -n "AGL" build/CMakeFiles/pocb.dir/link.txt; then
              exit 1
            fi
          fi

      - name: Build app bundle
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt frameworks
        run: macdeployqt build/pocb.app -verbose=1

      - name: Create DMG
        run: |
          mkdir -p dist
          bunx --yes create-dmg build/pocb.app dist --overwrite
          mv dist/pocb*.dmg dist/pocb-${{ steps.version.outputs.version }}-macos26-arm64.dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/pocb-${{ steps.version.outputs.version }}-macos26-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
