name: Release Build

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'CMakeLists.txt'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to rebuild (e.g. 0.1.0). Skips version check, tag, and release creation — only builds and attaches the DMG.'
        required: true

permissions:
  contents: write

jobs:
  check-version:
    name: Check for version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if version changed
        id: check
        run: |
          CURRENT_VERSION=$(grep -E '^project\(pocb VERSION ' CMakeLists.txt | sed -E 's/.*VERSION ([^ )]+).*/\1/')
          echo "Current version: $CURRENT_VERSION"

          git show HEAD^:CMakeLists.txt > /tmp/old_CMakeLists.txt 2>/dev/null || echo 'project(pocb VERSION 0.0.0 LANGUAGES CXX)' > /tmp/old_CMakeLists.txt
          PREV_VERSION=$(grep -E '^project\(pocb VERSION ' /tmp/old_CMakeLists.txt | sed -E 's/.*VERSION ([^ )]+).*/\1/')
          echo "Previous version: $PREV_VERSION"

          if git ls-remote --tags origin | grep -q "refs/tags/v$CURRENT_VERSION"; then
            echo "Tag v$CURRENT_VERSION already exists, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          elif [ "$CURRENT_VERSION" != "$PREV_VERSION" ]; then
            echo "Version changed from $PREV_VERSION to $CURRENT_VERSION"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged, skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  create-tag:
    name: Create release tag
    runs-on: ubuntu-latest
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ needs.check-version.outputs.version }}" -m "Release v${{ needs.check-version.outputs.version }}"
          git push origin "v${{ needs.check-version.outputs.version }}"

  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [check-version, create-tag]
    if: needs.check-version.outputs.should_release == 'true'
    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          body: macOS DMG build for pocb.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build macOS 26 arm64 DMG
    runs-on: macos-26
    needs: [check-version, create-release]
    if: always() && (needs.check-version.outputs.should_release == 'true' || github.event_name == 'workflow_dispatch')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          VERSION="${{ needs.check-version.outputs.version || github.event.inputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          cache: true

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=26.0

      - name: Build app bundle
        run: cmake --build build --config Release --parallel

      - name: Deploy Qt frameworks
        run: macdeployqt build/pocb.app -verbose=1

      - name: Create DMG
        run: |
          mkdir -p dist
          bunx --yes create-dmg build/pocb.app dist --overwrite
          mv dist/pocb*.dmg dist/pocb-${{ steps.version.outputs.version }}-macos26-arm64.dmg

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: dist/pocb-${{ steps.version.outputs.version }}-macos26-arm64.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
